<script>

let answers = {};

for (let i = 1; i <= 6; i++) {
  const data = JSON.parse(localStorage.getItem("question" + i) || "{}");
  Object.assign(answers, data);
}

function avg(list) {
  let sum = 0;
  let count = 0;

  list.forEach(v => {
    const val = Number(answers[v]);
    if (!isNaN(val)) {
      sum += val;
      count++;
    }
  });

  return count === 0 ? 0 : sum / count;
}

// ===== 軸計算 =====
const IB = avg(["q4","q8","q12","q15","q17","q21"]);
const PS = avg(["q2","q5","q10","q13","q18","q22"]);
const CN = avg(["q1","q7","q11","q16","q19","q23"]);
const CO = avg(["q3","q6","q9","q14","q20","q24"]);

// ===== タイプ判定 =====
const first = IB >= 3 ? "I" : "B";
const second = PS >= 3 ? "P" : "S";
const third = CN >= 3 ? "A" : "N";
const fourth = CO >= 3 ? "C" : "O";

const type = first + second + third + fourth;

// ===== 割合計算（ここが追加）=====
function percent(a, b) {
  const total = a + b;
  if (total === 0) return { a: 50, b: 50 };
  return {
    a: Math.round((a / total) * 100),
    b: Math.round((b / total) * 100)
  };
}

const ibP = percent(IB, 5 - IB);
const psP = percent(PS, 5 - PS);
const cnP = percent(CN, 5 - CN);
const coP = percent(CO, 5 - CO);

// ===== 表示 =====
document.getElementById("typeCode").innerHTML = type;

// 追加表示エリア（後でHTMLに入れる）
document.getElementById("description").innerHTML =
`
<div>
<p>${resultData?.[type]?.text || "未設定タイプ"}</p>

<hr>

<p><b>I/B</b>：I ${ibP.a}% / B ${ibP.b}%</p>
<p><b>P/S</b>：P ${psP.a}% / S ${psP.b}%</p>
<p><b>A/N</b>：A ${cnP.a}% / N ${cnP.b}%</p>
<p><b>C/O</b>：C ${coP.a}% / O ${coP.b}%</p>

</div>
`;

</script>
