<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>芸能ステータス診断｜診断結果</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>診断結果</h1>

<div class="result-card">

<div id="typeCode" class="typeCode">

IPCQ

</div>

<div id="typeName" class="typeName">

芸人タイプ

</div>

<p id="description" class="description">

診断結果を読み込み中...

</p>

</div>

<div class="buttonArea">

<button onclick="shareResult()" class="nextButton">

Xでシェア

</button>

<a href="index.html" class="restartButton">

もう一度診断する

</a>

</div>

</div>

<script>

let answers={};

for(let i=1;i<=6;i++){

Object.assign(

answers,

JSON.parse(localStorage.getItem("question"+i))

);

}

function avg(list){

let sum=0;

list.forEach(v=>{

sum+=Number(answers[v]);

});

return sum/list.length;

}

// I ⇔ B

const IB=avg(["q4","q8","q12","q15","q17","q21"]);

const first=IB>=3?"I":"B";

// P ⇔ S

const PS=avg(["q2","q5","q10","q13","q18","q22"]);

const second=PS>=3?"P":"S";

// C ⇔ N

const CN=avg(["q1","q7","q11","q16","q19","q23"]);

const third=CN>=3?"C":"N";

// Q ⇔ A

const QA=avg(["q3","q6","q9","q14","q20","q24"]);

const fourth=QA>=3?"A":"Q";

const type=first+second+third+fourth;

document.getElementById("typeCode").innerHTML=type;

const resultData={

IPCQ:{
name:"タイプA",
text:"構成力と静かな表現を武器にする分析型。"
},

IPCA:{
name:"タイプB",
text:"勢いと演技力で空気を支配する主人公型。"
},

IPNQ:{
name:"タイプC",
text:"自然体で笑いを生み出す観察型。"
},

IPNA:{
name:"タイプD",
text:"瞬発力抜群のムードメーカー型。"
},

BSCQ:{
name:"タイプM",
text:"丁寧な構成とセンスが光る職人型。"
},

BSNA:{
name:"タイプP",
text:"自分らしさを武器にした万能型。"
}

};

if(resultData[type]){

document.getElementById("typeName").innerHTML=resultData[type].name;

document.getElementById("description").innerHTML=resultData[type].text;

}else{

document.getElementById("typeName").innerHTML="未設定タイプ";

document.getElementById("description").innerHTML="今後追加予定です。";

}

function shareResult(){

const text=

"私の芸能ステータス診断は「"+

type+

"」でした！";

const url=

"https://migimimisan.github.io/owarai/";

window.open(

"https://twitter.com/intent/tweet?text="+

encodeURIComponent(text)+"&url="+

encodeURIComponent(url)

);

}

</script>

</body>

</html>
