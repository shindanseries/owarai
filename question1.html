<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>お笑いステータス診断｜質問1/6</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="progress">

<div class="progress-bar" style="width:16.7%;"></div>

</div>

<h1>お笑いステータス診断</h1>

<p class="page-number">

質問 1 / 6

</p>

<form id="questionForm">

<div class="question">

<h2>演技をしている時間が好きだ。</h2>

<div class="options">

<label><input type="radio" name="q1" value="5" required>とてもそう思う</label>
<label><input type="radio" name="q1" value="4">ややそう思う</label>
<label><input type="radio" name="q1" value="3">どちらともいえない</label>
<label><input type="radio" name="q1" value="2">あまりそう思わない</label>
<label><input type="radio" name="q1" value="1">全くそう思わない</label>

</div>

</div>

<div class="question">

<h2>ノリで押し切るのが得意だ。</h2>

<div class="options">

<label><input type="radio" name="q2" value="5" required>とてもそう思う</label>
<label><input type="radio" name="q2" value="4">ややそう思う</label>
<label><input type="radio" name="q2" value="3">どちらともいえない</label>
<label><input type="radio" name="q2" value="2">あまりそう思わない</label>
<label><input type="radio" name="q2" value="1">全くそう思わない</label>

</div>

</div>

<div class="question">

<h2>人を傷つける可能性のある笑いは全く認可すべきでない。</h2>

<div class="options">

<label><input type="radio" name="q3" value="5" required>とてもそう思う</label>
<label><input type="radio" name="q3" value="4">ややそう思う</label>
<label><input type="radio" name="q3" value="3">どちらともいえない</label>
<label><input type="radio" name="q3" value="2">あまりそう思わない</label>
<label><input type="radio" name="q3" value="1">全くそう思わない</label>

</div>

</div>

<div class="question">

<h2>平場で急に振られても力を発揮できる。</h2>

<div class="options">

<label><input type="radio" name="q4" value="5" required>とてもそう思う</label>
<label><input type="radio" name="q4" value="4">ややそう思う</label>
<label><input type="radio" name="q4" value="3">どちらともいえない</label>
<label><input type="radio" name="q4" value="2">あまりそう思わない</label>
<label><input type="radio" name="q4" value="1">全くそう思わない</label>

</div>

</div>

<button type="submit" class="nextButton">

次へ →

</button>

</form>

</div>

<script>

document.getElementById("questionForm").addEventListener("submit",function(e){

e.preventDefault();

const answers={

q1:Number(document.querySelector('input[name="q1"]:checked').value),
q2:Number(document.querySelector('input[name="q2"]:checked').value),
q3:Number(document.querySelector('input[name="q3"]:checked').value),
q4:Number(document.querySelector('input[name="q4"]:checked').value)

};

localStorage.setItem("question1",JSON.stringify(answers));

window.location.href="question2.html";

});

</script>

</body>

</html>
