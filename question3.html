<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<body>

<div class="container">

<div class="progress">

<form id="questionForm">

</div>

<div class="question">

<h2>多少雑でも勢いがあれば笑いになると思う。</h2>

<div class="question">

</div>

</div>

<div class="question">

<div class="options">

<label><input type="radio" name="q12" value="5" required>とてもそう思う</label>

</div>

</div>

<button type="submit" class="nextButton">

次へ →

</button>

</form>

</div>

<script>

document.getElementById("questionForm").addEventListener("submit",function(e){

e.preventDefault();

const answers={

q9:Number(document.querySelector('input[name="q9"]:checked').value),
q10:Number(document.querySelector('input[name="q10"]:checked').value),
q11:Number(document.querySelector('input[name="q11"]:checked').value),
q12:Number(document.querySelector('input[name="q12"]:checked').value)

};

localStorage.setItem("question3",JSON.stringify(answers));

window.location.href="question4.html";

});

</script>
